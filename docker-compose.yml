services:
  postgres:
    image: postgres:16-alpine
    container_name: agenthub-db
    environment:
      POSTGRES_USER: agenthub
      POSTGRES_PASSWORD: agenthub
      POSTGRES_DB: agenthub
    ports:
      - "5436:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  neo4j:
    image: neo4j:5.26.0-community
    container_name: agenthub-neo4j
    environment:
      NEO4J_AUTH: neo4j/agenthub123
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
    ports:
      - "7475:7474"
      - "7688:7687"
    volumes:
      - neo4jdata:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "neo4j", "status"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # SearXNG — self-hosted web search (no API keys needed)
  searxng:
    image: searxng/searxng:latest
    container_name: agenthub-searxng
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080
    volumes:
      - ./searxng:/etc/searxng
    ports:
      - "8888:8080"
    restart: unless-stopped

  # Browserless — headless Chrome pool (warm browsers ready for agents)
  browserless:
    image: ghcr.io/browserless/chromium:latest
    container_name: agenthub-browser
    environment:
      TOKEN: mobhub123
      CONCURRENT: 5
      QUEUED: 10
      TIMEOUT: 30000
    ports:
      - "3300:3000"
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: agenthub-backend
    ports:
      - "8787:8080"
    environment:
      DATABASE_URL: postgresql+asyncpg://agenthub:agenthub@postgres:5432/agenthub
      DATABASE_URL_SYNC: postgresql://agenthub:agenthub@postgres:5432/agenthub
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: agenthub123
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SEARXNG_URL: http://searxng:8080
      BROWSERLESS_URL: ws://browserless:3000
      BROWSERLESS_TOKEN: mobhub123
    depends_on:
      postgres:
        condition: service_started
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: agenthub-frontend
    ports:
      - "3737:80"
    depends_on:
      - backend
    restart: unless-stopped

  demo:
    build: ./agents
    container_name: agenthub-demo
    environment:
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-4o-mini}
    depends_on:
      - backend
    profiles:
      - demo
    network_mode: "service:backend"

volumes:
  pgdata:
  neo4jdata:
